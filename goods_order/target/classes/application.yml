server:
  port: 8888  # 服务端口

spring:
  datasource:
    # 数据库连接信息
    url: jdbc:mysql://localhost:3306/?goods_order=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useUnicode=true
    username: root
    password: aa111111
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启驼峰命名转换：数据库的 create_time 自动映射到 Java 的 createTime
    map-underscore-to-camel-case: true
    # 打印 SQL 日志到控制台，开发阶段方便调试，上线前关掉
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 逻辑删除配置：deleted=0 表示正常，deleted=1 表示已删除
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1
      # 主键策略：自增
      id-type: auto